<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escudo Digital</title>
    <meta http-equiv="refresh" content="0; url=/dist/" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f6fbff 0%, #eef4ff 100%);
        color: #10213f;
      }

      main {
        width: min(100%, 640px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(16, 33, 63, 0.08);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 16px 60px rgba(16, 33, 63, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      p {
        margin: 0 0 12px;
        line-height: 1.55;
      }

      a {
        color: #2158d8;
        font-weight: 600;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        main {
          padding: 22px;
          border-radius: 18px;
        }
      }
    </style>
    <script>
      window.location.replace('/dist/');
    </script>
  </head>
  <body>
    <main>
      <h1>Escudo Digital</h1>
      <p>Redirigiendo al nuevo frontend construido con React.</p>
      <p>Si no sucede automaticamente, entra en <a href="/dist/">/dist/</a>.</p>
    </main>
  </body>
</html>
